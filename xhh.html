<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Xã Hội Học Đại Cương</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f6f9;
            --card: #ffffff;
            --text: #333333;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #e67e22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 30px 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* ------------------ GIAO DIỆN MENU CHÍNH ------------------ */
        .main-menu h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .main-menu .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .chapter-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chapter-card {
            background: var(--card);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #bdc3c7;
        }

        .chapter-card.active {
            border-left-color: var(--accent);
        }

        .chapter-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .quiz-btn {
            background: #edf2f7;
            color: var(--primary);
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .quiz-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .status-badge {
            font-size: 0.8rem;
            background: #fef3c7;
            color: #d97706;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
            display: inline-block;
        }

        /* ------------------ GIAO DIỆN LÀM BÀI ------------------ */
        .quiz-screen {
            display: none;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .quiz-header {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quiz-header h2 {
            color: var(--primary);
            font-size: 1.4rem;
        }

        .stats-box {
            background: #edf2f7;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--primary);
        }

        .question-item {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 8px;
            background: #f8fafc;
            border-left: 5px solid var(--accent);
        }

        /* Khi đã trả lời xong câu đó, đổi màu viền để dễ nhận biết */
        .question-item.answered {
            border-left-color: #cbd5e1;
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .answer-option {
            margin-bottom: 8px;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .answer-option:hover {
            background: #f1f5f9;
        }

        .answer-option input {
            margin-right: 12px;
            transform: scale(1.1);
        }

        /* Khóa tương tác sau khi đã chọn đáp án ở câu đó */
        .answers-list.disabled .answer-option {
            pointer-events: none;
            cursor: not-allowed;
        }

        /* Hiệu ứng màu sắc trực quan ngay lập tức */
        .answer-option.correct {
            background: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724;
            font-weight: 600;
        }

        .answer-option.wrong {
            background: #f8d7da !important;
            border-color: var(--error) !important;
            color: #721c24;
        }

        .explanation {
            margin-top: 12px;
            padding: 12px 15px;
            background: #e0f2fe;
            border-radius: 6px;
            font-size: 0.92rem;
            color: #0369a1;
            display: none;
            line-height: 1.5;
            border-left: 3px solid #0284c7;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .btn-back { background: #95a5a6; color: white; flex: 1; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ================= MÀN HÌNH CHÍNH (MENU) ================= -->
        <div id="menuScreen" class="main-menu">
            <h1>Hệ Thống Trắc Nghiệm Xã Hội Học Đại Cương</h1>
            <p class="subtitle">Chế độ luyện tập: Chọn đáp án xem kết quả giải thích ngay lập tức</p>
            
            <div class="chapter-list" id="chapterContainer"></div>
        </div>

        <!-- ================= MÀN HÌNH LÀM BÀI TRẮC NGHIỆM ================= -->
        <div id="quizScreen" class="quiz-screen">
            <div class="quiz-header">
                <div>
                    <h2 id="currentQuizTitle">Bộ đề trắc nghiệm</h2>
                    <p style="color: #7f8c8d; font-size: 0.85rem; margin-top:3px;" id="currentChapterTitle">Chương học</p>
                </div>
                <!-- Thanh thống kê số câu đúng/sai trực tiếp -->
                <div class="stats-box" id="scoreStats">Đã làm: 0/0 câu | Đúng: 0</div>
            </div>

            <form id="quizForm">
                <div id="questionsContainer"></div>
                <div class="btn-group">
                    <button type="button" class="btn btn-back" onclick="exitQuiz()">Quay về Menu chính</button>
                </div>
            </form>
        </div>

    </div>

    <script>
        // CẤU HÌNH DỮ LIỆU HỆ THỐNG
        const SYSTEM_DATA = [
            {
                id: "chuong-1",
                title: "Chương 1: Đối tượng, cơ cấu, chức năng của xã hội học",
                fileUrl: "chuong-1.html",
                status: "developing",
                quizzes: [
                    { name: "AUGUSTE COMTE", file: "c1-comte.js" },
                    { name: "KARL MARX", file: "c1-marx.js" },
                    { name: "HERBERT SPENCER", file: "c1-spencer.js" },
                    { name: "ÉMILE DURKHEIM", file: "c1-durkheim.js" },
                    { name: "MAX WEBER", file: "c1-weber.js" }
                ]
            },
            {
                id: "chuong-2",
                title: "Chương 2: Sơ lược lịch sử và lý thuyết xã hội học",
                fileUrl: "chuong-2.html",
                status: "active",
                quizzes: [
                    { name: "AUGUSTE COMTE", file: "de-bai-1.js" },
                    { name: "KARL MARX", file: "de-bai-2.js" },
                    { name: "HERBERT SPENCER", file: "de-bai-3.js" },
                    { name: "ÉMILE DURKHEIM", file: "de-bai-4.js" },
                    { name: "MAX WEBER", file: "de-bai-5.js" }
                ]
            },
            { id: "chuong-3", title: "Chương 3: Phương pháp nghiên cứu xã hội học", fileUrl: "chuong-3.html", status: "developing" },
            { id: "chuong-4", title: "Chương 4: Hành động xã hội, tương tác xã hội, quan hệ xã hội", fileUrl: "chuong-4.html", status: "developing" },
            { id: "chuong-5", title: "Chương 5: Cấu trúc xã hội và một số thuật ngữ liên quan", fileUrl: "chuong-5.html", status: "developing" },
            { id: "chuong-6", title: "Chương 6: Quyền lực, bất bình đẳng, phân tầng xã hội, di động xã hội", fileUrl: "chuong-6.html", status: "developing" },
            { id: "chuong-7", title: "Chương 7: Lệch chuẩn, tuân thủ và kiểm soát xã hội", fileUrl: "chuong-7.html", status: "developing" },
            { id: "chuong-8", title: "Chương 8: Văn hóa", fileUrl: "chuong-8.html", status: "developing" },
            { id: "chuong-9", title: "Chương 9: Xã hội hóa", fileUrl: "chuong-9.html", status: "developing" },
            { id: "chuong-10", title: "Chương 10: Biến đổi xã hội", fileUrl: "chuong-10.html", status: "developing" }
        ];

        let loadedQuestions = [];
        let answeredCount = 0;
        let correctCount = 0;

        // Dựng giao diện cây mục lục giáo trình
        document.addEventListener("DOMContentLoaded", function () {
            const container = document.getElementById("chapterContainer");
            container.innerHTML = "";

            SYSTEM_DATA.forEach(ch => {
                const card = document.createElement("div");
                card.className = `chapter-card ${ch.status === 'active' ? 'active' : ''}`;
                
                let quizButtonsHtml = "";
                
                if (ch.status === "active" && ch.quizzes) {
                    quizButtonsHtml = `<div class="quiz-options">`;
                    ch.quizzes.forEach(q => {
                        quizButtonsHtml += `<button class="quiz-btn" onclick="loadQuizData('${q.file}', '${q.name}', '${ch.title}')">Đề: ${q.name}</button>`;
                    });
                    quizButtonsHtml += `</div>`;
                } else if (ch.id === "chuong-1" && ch.status === "developing") {
                    quizButtonsHtml = `
                        <div style="margin-bottom: 8px;"><span class="status-badge">Nội dung đang phát triển</span></div>
                        <div class="quiz-options" style="opacity: 0.6; pointer-events: none;">
                            <button class="quiz-btn">AUGUSTE COMTE</button>
                            <button class="quiz-btn">KARL MARX</button>
                            <button class="quiz-btn">HERBERT SPENCER</button>
                            <button class="quiz-btn">ÉMILE DURKHEIM</button>
                            <button class="quiz-btn">MAX WEBER</button>
                        </div>`;
                } else {
                    quizButtonsHtml = `<div><span class="status-badge">Đang phát triển thiết chế dữ liệu...</span></div>`;
                }

                card.innerHTML = `
                    <div class="chapter-title">${ch.title}</div>
                    ${quizButtonsHtml}
                `;
                container.appendChild(card);
            });
        });

        // Tải động file JS chứa câu hỏi
        function loadQuizData(fileName, authorName, chapterTitle) {
            const oldScript = document.getElementById("dynamicQuizScript");
            if (oldScript) oldScript.remove();

            const script = document.createElement("script");
            script.id = "dynamicQuizScript";
            script.src = fileName;

            script.onload = function () {
                if (typeof QUIZ_QUESTIONS !== "undefined") {
                    loadedQuestions = QUIZ_QUESTIONS;
                    setupQuizScreen(authorName, chapterTitle);
                } else {
                    alert(`Không tìm thấy mảng QUIZ_QUESTIONS trong file: ${fileName}`);
                }
            };

            script.onerror = function() {
                alert(`Lỗi: Không tìm thấy file [${fileName}] trong cùng thư mục.`);
            };

            document.body.appendChild(script);
        }

        // Thiết lập màn hình ôn tập
        function setupQuizScreen(author, chapter) {
            document.getElementById("menuScreen").style.display = "none";
            document.getElementById("quizScreen").style.display = "block";
            document.getElementById("currentQuizTitle").innerText = `Bộ đề ôn tập: ${author}`;
            document.getElementById("currentChapterTitle").innerText = chapter;
            
            // Khởi tạo lại bộ đếm thống kê
            answeredCount = 0;
            correctCount = 0;
            updateStatsBar();

            renderQuestions(loadedQuestions);
        }

        // Hiển thị danh sách câu hỏi
        function renderQuestions(questions) {
            const container = document.getElementById("questionsContainer");
            container.innerHTML = "";

            questions.forEach((q, index) => {
                const idx = index + 1;
                const item = document.createElement("div");
                item.className = "question-item";
                item.id = `q_box_${idx}`;

                let answersHtml = "";
                for (let key in q.answers) {
                    answersHtml += `
                        <label class="answer-option" onclick="checkAnswerImmediately(this, '${key}', '${q.correct}', ${idx})">
                            <input type="radio" name="q_${idx}" value="${key}">
                            <span><strong>${key}.</strong> ${q.answers[key]}</span>
                        </label>
                    `;
                }

                item.innerHTML = `
                    <div class="question-text">Câu ${idx}: ${q.question}</div>
                    <div class="answers-list" id="ans_list_${idx}">${answersHtml}</div>
                    <div class="explanation" id="exp_${idx}">
                        <strong style="color: #155724;">✓ Đáp án chuẩn: ${q.correct}</strong><br>
                        <span style="display:inline-block; margin-top:5px;">${q.explain}</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // XỬ LÝ KIỂM TRA ĐÁP ÁN NGAY LẬP TỨC KHI CLICK
        function checkAnswerImmediately(selectedLabel, userChoice, correctAnswer, questionIndex) {
            const listWrapper = document.getElementById(`ans_list_${questionIndex}`);
            
            // Nếu câu này đã được click trả lời rồi thì bỏ qua không xử lý lại
            if (listWrapper.classList.contains("disabled")) return;

            // Khóa vùng chọn của câu này lại
            listWrapper.classList.contains("disabled") || listWrapper.classList.add("disabled");
            
            // Đổi style hộp câu hỏi để báo hiệu đã làm xong
            document.getElementById(`q_box_${questionIndex}`).classList.add("answered");

            // Tick chọn radio ngầm
            const input = selectedLabel.querySelector("input");
            if (input) input.checked = true;

            // Kiểm tra Đúng / Sai để tô màu trực tiếp
            if (userChoice === correctAnswer) {
                selectedLabel.classList.add("correct");
                correctCount++;
            } else {
                selectedLabel.classList.add("wrong");
                // Tìm option đúng để tô màu xanh lên cho người học thấy đối chiếu
                const options = listWrapper.querySelectorAll(".answer-option");
                options.forEach(opt => {
                    const radio = opt.querySelector("input");
                    if (radio && radio.value === correctAnswer) {
                        opt.classList.add("correct");
                    }
                });
            }

            // Hiện khung giải thích kiến thức ngay lập tức dưới câu hỏi
            document.getElementById(`exp_${questionIndex}`).style.display = "block";

            // Cập nhật điểm số thời gian thực lên thanh tiêu đề
            answeredCount++;
            updateStatsBar();
        }

        // Cập nhật thanh trạng thái tiến độ làm bài
        function updateStatsBar() {
            const total = loadedQuestions.length;
            document.getElementById("scoreStats").innerText = `Đã trả lời: ${answeredCount}/${total} câu | Đúng: ${correctCount}`;
        }

        // Thoát giao diện làm bài quay về Menu chính
        function exitQuiz() {
            document.getElementById("quizScreen").style.display = "none";
            document.getElementById("menuScreen").style.display = "block";
            window.scrollTo({ top: 0 });
        }
    </script>
</body>
</html>
