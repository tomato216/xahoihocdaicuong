<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Làm Bài Trắc Nghiệm Xã Hội Học</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Thanh trạng thái phía trên */
        .quiz-header {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quiz-info h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .quiz-info p {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .timer-box {
            background: #edf2f7;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        /* Khung câu hỏi */
        .question-item {
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 8px;
            background: #f8fafc;
            border-left: 5px solid var(--accent-color);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .answers-list {
            list-style: none;
        }

        .answer-option {
            margin-bottom: 10px;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .answer-option:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .answer-option input {
            margin-right: 12px;
            transform: scale(1.2);
            cursor: pointer;
        }

        /* Định dạng hiển thị đáp án khi chấm điểm */
        .answer-option.correct {
            background: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
            font-weight: 600;
        }

        .answer-option.wrong {
            background: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        .explanation {
            margin-top: 12px;
            padding: 12px;
            background: #e0f2fe;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #0369a1;
            display: none;
            line-height: 1.5;
        }

        /* Nút bấm điều hướng */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit {
            background: var(--success-color);
            color: white;
            flex: 2;
        }

        .btn-submit:hover {
            background: #27ae60;
        }

        .btn-back {
            background: #95a5a6;
            color: white;
            flex: 1;
        }

        .btn-back:hover {
            background: #7f8c8d;
        }

        /* Kết quả điểm số */
        .result-box {
            display: none;
            background: #e8f8f5;
            border: 2px solid var(--success-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary-color);
        }

        .result-box h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="quiz-header">
            <div class="quiz-info">
                <h1 id="bodeTitle">Đang tải bộ đề...</h1>
                <p id="chuongTitle">Vui lòng đợi trong giây lát</p>
            </div>
            <div class="timer-box" id="timer">Thời gian: 50:00</div>
        </div>

        <div class="result-box" id="resultBox"></div>

        <form id="quizForm">
            <div id="questionsContainer"></div>
            
            <div class="btn-group">
                <button type="button" class="btn-back" onclick="goBack()">Quay lại danh sách</button>
                <button type="button" class="btn-submit" id="submitBtn" onclick="submitQuiz()">Nộp bài chấm điểm</button>
            </div>
        </form>
    </div>

    <script src="data.js"></script>

    <script>
        let currentQuestions = [];
        let timerInterval;
        let timeRemaining = 50 * 60; // 50 phút đổi ra giây

        document.addEventListener("DOMContentLoaded", function () {
            // Lấy ID bộ đề người dùng đã chọn từ trang danh-sach.html thông qua localStorage
            const selectedQuizId = localStorage.getItem("selectedQuizId") || "bode-1";

            // Tìm kiếm cấu hình tương ứng trong file data.js
            const currentConfig = DATA_QUIZ.find(q => q.id === selectedQuizId);

            if (currentConfig) {
                // Đổ tiêu đề bài học lên giao diện
                document.getElementById("bodeTitle").innerText = currentConfig.bodeTitle;
                document.getElementById("chuongTitle").innerText = currentConfig.chuongTitle;

                // BƯỚC 2: Tự động chèn file kịch bản chứa câu hỏi tương ứng (Nạp động)
                const script = document.createElement("script");
                script.src = currentConfig.fileScript; 

                // Sau khi file .js đề bài tải xong, khởi chạy tạo câu hỏi
                script.onload = function () {
                    if (typeof QUIZ_QUESTIONS !== "undefined") {
                        currentQuestions = QUIZ_QUESTIONS;
                        renderQuestions(QUIZ_QUESTIONS);
                        startTimer();
                    } else {
                        document.getElementById("questionsContainer").innerHTML = "<p>Lỗi: Không tìm thấy mảng dữ liệu câu hỏi!</p>";
                    }
                };
                document.body.appendChild(script);
            } else {
                document.getElementById("bodeTitle").innerText = "Không tìm thấy bộ đề phù hợp!";
            }
        });

        // Hàm vẽ câu hỏi ra màn hình HTML
        function renderQuestions(questions) {
            const container = document.getElementById("questionsContainer");
            container.innerHTML = ""; // Xóa dữ liệu cũ rỗng

            questions.forEach((q, index) => {
                const qIndex = index + 1;
                const qItem = document.createElement("div");
                qItem.className = "question-item";
                qItem.id = `question-${qIndex}`;

                let answersHtml = "";
                // Tạo các phương án lựa chọn A, B, C, D
                for (let key in q.answers) {
                    answersHtml += `
                        <label class="answer-option" onclick="selectOption(this)">
                            <input type="radio" name="question_${qIndex}" value="${key}">
                            <span><strong>${key}.</strong> ${q.answers[key]}</span>
                        </label>
                    `;
                }

                qItem.innerHTML = `
                    <div class="question-text">Câu ${qIndex}. ${q.question}</div>
                    <div class="answers-list">${answersHtml}</div>
                    <div class="explanation" id="explain-${qIndex}">
                        <strong>Đáp án chuẩn: ${q.correct}</strong><br>
                        <em>Giải thích:</em> ${q.explain}
                    </div>
                `;
                container.appendChild(qItem);
            });
        }

        // Tạo hiệu ứng chọn phương án khi click vào cả dòng
        function selectOption(element) {
            const parent = element.closest(".answers-list");
            parent.querySelectorAll(".answer-option").forEach(opt => {
                opt.style.background = "white";
                opt.style.borderColor = "#cbd5e1";
            });
            element.style.background = "#e0f2fe";
            element.style.borderColor = "var(--accent-color)";
            const radio = element.querySelector("input[type='radio']");
            if (radio) radio.checked = true;
        }

        // Hàm quản lý đồng hồ đếm ngược
        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("Hết giờ làm bài! Hệ thống sẽ tự động nộp bài.");
                    submitQuiz();
                } else {
                    timeRemaining--;
                    const mins = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
                    const secs = (timeRemaining % 60).toString().padStart(2, '0');
                    document.getElementById("timer").innerText = `Thời gian: ${mins}:${secs}`;
                }
            }, 1000);
        }

        // Hàm tính điểm và hiển thị đáp án/giải thích
        function submitQuiz() {
            clearInterval(timerInterval); // Dừng đồng hồ lại
            let score = 0;
            const total = currentQuestions.length;

            currentQuestions.forEach((q, index) => {
                const qIndex = index + 1;
                const radioGroup = document.getElementsByName(`question_${qIndex}`);
                let selectedValue = "";

                // Tìm phương án học viên chọn
                for (let radio of radioGroup) {
                    if (radio.checked) {
                        selectedValue = radio.value;
                        break;
                    }
                }

                // Chấm điểm và tô màu chỉ thị trực quan
                for (let radio of radioGroup) {
                    const optionLabel = radio.closest(".answer-option");
                    
                    // Reset lại màu nền mặc định ban đầu trước khi hiển thị kết quả đúng sai
                    optionLabel.style.background = "white";

                    if (radio.value === q.correct) {
                        optionLabel.classList.add("correct"); // Tô xanh đáp án đúng
                    }
                    if (radio.checked && selectedValue !== q.correct) {
                        optionLabel.classList.add("wrong"); // Tô đỏ nếu chọn sai
                    }
                }

                if (selectedValue === q.correct) {
                    score++;
                }

                // Hiển thị khung giải thích chi tiết của câu hỏi lên giao diện
                document.getElementById(`explain-${qIndex}`).style.display = "block";
            });

            // Hiển thị khung tổng hợp điểm số lên đầu trang
            const resBox = document.getElementById("resultBox");
            resBox.style.display = "block";
            resBox.innerHTML = `
                <h2>Kết quả: ${score}/${total} Câu Đúng</h2>
                <p>Bạn đạt được <strong>${((score / total) * 10).toFixed(2)}</strong> điểm. Hãy kéo xuống dưới để xem lại giải thích chi tiết đáp án từng câu.</p>
            `;

            // Vô hiệu hóa nút nộp bài và cuộn màn hình lên trên cùng để xem kết quả
            document.getElementById("submitBtn").disabled = true;
            document.getElementById("submitBtn").style.opacity = "0.5";
            document.getElementById("submitBtn").innerText = "Đã nộp bài thành công";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Hàm quay trở lại danh sách bộ đề ban đầu
        function goBack() {
            window.location.href = "danh-sach.html";
        }
    </script>
</body>
</html>
