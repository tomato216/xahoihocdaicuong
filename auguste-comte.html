<script>
    const questionsData = [
        { q: "1. Auguste Comte sống trong giai đoạn nào?", opts: { A: "1760 – 1825", B: "1798 – 1857", C: "1818 – 1883", D: "1858 – 1917" }, ans: "B", exp: "Auguste Comte sinh năm 1798 và mất năm 1857." },
        { q: "2. Auguste Comte là nhà khoa học người nước nào?", opts: { A: "Đức", B: "Anh", C: "Mỹ", D: "Pháp" }, ans: "D", exp: "Auguste Comte là nhà toán học, vật lý học, thiên văn học, triết học thực chứng và nhà xã hội học người Pháp." },
        { q: "3. Ngoài vai trò là nhà xã hội học, Auguste Comte còn được biết đến là nhà khoa học thuộc những lĩnh vực nào?", opts: { A: "Toán học, vật lý học, thiên văn học, triết học thực chứng", B: "Hóa học, địa chất học, triết học tự nhiên, lịch sử học", C: "Sinh học, y học, kinh tế học, tâm lý học nhân cách", D: "Văn học cổ điển, luật học, địa lý học, nhân chủng học" }, ans: "A", exp: "Auguste Comte là nhà toán học, vật lý học, thiên văn học, triết học thực chứng và nhà xã hội học người Pháp." },
        { q: "4. Auguste Comte trưởng thành trong bối cảnh lịch sử nào của nước Pháp?", opts: { A: "Thời kỳ Phục hưng", B: "Thời kỳ Cách mạng Pháp", C: "Thời kỳ Chiến tranh thế giới thứ nhất", D: "Thời kỳ Trung cổ sụp đổ" }, ans: "B", exp: "Ông trưởng thành trong thời kỳ Cách mạng Pháp khi mà xã hội đang trải qua những biến động sâu sắc." },
        { q: "5. Auguste Comte sinh ra và lớn lên trong một gia đình theo xu hướng tôn giáo và chính trị nào?", opts: { A: "Gia đình Tin lành theo xu hướng cộng hòa", B: "Gia đình Kitô giáo theo xu hướng quân chủ", C: "Gia đình Hồi giáo theo xu hướng quân phiệt", D: "Gia đình Phật giáo theo xu hướng trung lập" }, ans: "B", exp: "Ông sinh ra và lớn lên trong một gia đình Kitô giáo theo xu hướng quân chủ nhưng lại nung nấu tư tưởng tự do và cách mạng rất sớm." },
        { q: "6. Mặc dù lớn lên trong gia đình có xu hướng quân chủ, Auguste Comte đã sớm nung nấu tư tưởng gì?", opts: { A: "Tư tưởng bảo thủ và trung lập", B: "Tư tưởng tự do và cách mạng", C: "Tư tưởng tôn giáo thần bí", D: "Tư tưởng quân phiệt chuyên chế" }, ans: "B", exp: "Tuy sinh ra và lớn lên trong một gia đình Kitô giáo theo xu hướng quân chủ nhưng ông lại nung nấu tư tưởng tự do và cách mạng rất sớm." },
        { q: "7. Sau khi rời quê hương lên Paris, Auguste Comte đã dành phần lớn thời gian để làm gì?", opts: { A: "Tham gia trực tiếp vào các cuộc khởi nghĩa vũ trang", B: "Thành lập các doanh nghiệp sản xuất công nghiệp", C: "Quan sát và phản ánh kịch tính của đời sống con người diễn ra xung quanh", D: "Giảng dạy toán học tại các trường phổ thông nông thôn" }, ans: "C", exp: "Ông khăn gói lên Paris, nơi ông dành phần lớn thời gian để quan sát và phản ánh kịch tính của đời sống con người diễn ra xung quanh." },
        { q: "8. Từ năm 1817 đến năm 1824, Auguste Comte đã làm công việc gì cho nhà tư tưởng Saint Simon?", opts: { A: "Cố vấn pháp luật", B: "Người đại diện truyền thông", C: "Trợ lý nghiên cứu thực địa", D: "Thư ký riêng" }, ans: "D", exp: "Từ năm 1817 đến năm 1824, ông là thư ký riêng cho Saint Simon, một trong những người sáng lập ra chủ nghĩa thực chứng." },
        { q: "9. Auguste Comte là người đầu tiên đưa ra thuật ngữ “xã hội học” (sociologie) vào năm nào?", opts: { A: "1817", B: "1824", C: "1838", D: "1857" }, ans: "C", exp: "Năm 1838, ông là người đầu tiên đưa ra thuật ngữ “xã hội học” (sociologie)." },
        { q: "10. Thuật ngữ “xã hội học” (sociologie) do Auguste Comte kiến tạo bắt nguồn từ những ngôn ngữ nào?", opts: { A: "Tiếng Hy Lạp và tiếng Đức", B: "Chữ Latinh và tiếng Hy Lạp", C: "Tiếng Pháp cổ và chữ Phạn", D: "Tiếng Anh và tiếng Tây Ban Nha" }, ans: "B", exp: "Thuật ngữ này bắt nguồn từ chữ Latinh, được kiến tạo từ hai thành phần: (1) xã hội (societas) và (2) “học thuyết, quy luật” (logos) của tiếng Hy Lạp." },
        { q: "11. Trong cấu trúc thuật ngữ \"sociologie\" do Comte đưa ra, từ \"societas\" thuộc tiếng Latinh có nghĩa là gì?", opts: { A: "Cộng đồng", B: "Con người", C: "Xã hội", D: "Giao tiếp" }, ans: "C", exp: "Thành phần thứ nhất bắt nguồn từ chữ Latinh là \"societas\" có nghĩa là xã hội." },
        { q: "12. Trong cấu trúc thuật ngữ \"sociologie\" của Comte, từ \"logos\" trong tiếng Hy Lạp có nghĩa là gì?", opts: { A: "Phương pháp luận, công cụ", B: "Học thuyết, quy luật", C: "Sự biến đổi, vận động", D: "Ý thức, tư tưởng" }, ans: "B", exp: "Thành phần thứ hai là \"logos\" của tiếng Hy Lạp, có nghĩa là \"học thuyết, quy luật\"." },
        { q: "13. Theo ý nghĩa thuật ngữ mà Comte đưa ra, xã hội học được định nghĩa là gì?", opts: { A: "Khoa học kiến tạo các quan điểm, hệ thống thuật ngữ và lý thuyết nhằm phát hiện các quy luật, lôgic về xã hội loài người", B: "Khoa học nghiên cứu về tâm lý và hành vi của từng cá nhân riêng lẻ", C: "Khoa học nghiên cứu về sự phân bố địa lý của các dân tộc trên thế giới", D: "Khoa học nghiên cứu về lịch sử các cuộc chiến tranh phong kiến" }, ans: "A", exp: "Theo nghĩa này, xã hội học là khoa học kiến tạo các quan điểm, hệ thống thuật ngữ và lý thuyết nhằm phát hiện các quy luật, lôgic về xã hội loài người." },
        { q: "14. Nhờ những đóng góp to lớn đặt nền móng cho một ngành khoa học mới, Auguste Comte được nhiều nhà khoa học sau này suy tôn là gì?", opts: { A: "Nhà triết học vĩ đại nhất thế giới", B: "Ông tổ của xã hội học", C: "Nhà cách mạng xã hội học Pháp", D: "Người sáng lập chủ nghĩa duy vật biện chứng" }, ans: "B", exp: "Với những cống hiến của ông cho một ngành khoa học mới, nhiều nhà khoa học sau này vẫn suy tôn ông là ông tổ của xã hội học." },
        { q: "15. Ai là người đã kết nối hoàn thiện và lôgic những tư tưởng của Saint Simon để hình thành và đặt tên cho ngành xã hội học?", opts: { A: "Karl Marx", B: "Auguste Comte", C: "Herbert Spencer", D: "Émile Durkheim" }, ans: "B", exp: "Chỉ đến khi Auguste Comte kết nối hoàn thiện và lôgic những tư tưởng của Saint Simon thì một ngành khoa học xã hội mới được hình thành và đặt tên là xã hội học." },
        { q: "16. Đâu là một trong ba tác phẩm chính thể hiện tư tưởng xã hội học cốt yếu của Auguste Comte?", opts: { A: "Bản thảo kinh tế - triết học", B: "Hệ thống chính trị thực chứng", C: "Sự phân công lao động xã hội", D: "Các nguyên lý của xã hội học" }, ans: "B", exp: "Những tư tưởng xã hội học cốt yếu của tác giả này được thể hiện trong ba tác phẩm chính gồm: Hệ thống chính trị thực chứng..., Diễn ngôn về tinh thần thực chứng và Môn học triết học thực chứng." },
        { q: "17. Tác phẩm nào dưới đây thuộc các công trình nghiên cứu cơ bản của Auguste Comte?", opts: { A: "Tư bản", B: "Quy tắc của phương pháp xã hội học", C: "Diễn ngôn về tinh thần thực chứng", D: "Đạo đức Tin lành và tinh thần của chủ nghĩa tư bản" }, ans: "C", exp: "Các công trình nghiên cứu cơ bản của A. Comte bao gồm: Hệ thống chính trị thực chứng, Chuyên luận xã hội học về quá trình thiết chế hóa tôn giáo của nhân loại; Diễn ngôn về tinh thần thực chứng và Môn học triết học thực chứng." },
        { q: "18. Công trình nghiên cứu nào của Auguste Comte có độ dài gồm 04 tập?", opts: { A: "Diễn ngôn về tinh thần thực chứng", B: "Hệ thống chính trị thực chứng hay Chuyên luận xã hội học về quá trình thiết chế hóa tôn giáo của nhân loại", C: "Môn học triết học thực chứng", D: "Vật lý học xã hội đại cương" }, ans: "B", exp: "Công trình \"Hệ thống chính trị thực chứng hay Chuyên luận xã hội học về quá trình thiết chế hóa tôn giáo của nhân loại\" gồm có 04 tập." },
        { q: "19. Xã hội học của Auguste Comte tuân thủ phương pháp luận nào?", opts: { A: "Phương pháp luận siêu hình", B: "Phương pháp luận thực chứng", C: "Phương pháp luận duy vật biện chứng", D: "Phương pháp luận lý giải chủ quan" }, ans: "B", exp: "Xã hội học của Comte tuân thủ phương pháp luận thực chứng." },
        { q: "20. Theo phương pháp luận thực chứng của Comte, nhà nghiên cứu cần lý giải các hiện tượng xã hội bằng cách nào?", opts: { A: "Bằng các dữ liệu khách quan đồng thời giảm thiểu các dữ liệu chủ quan", B: "Bằng các suy luận triết lý tự biện và thần học trừu tượng", C: "Bằng các tín điều tôn giáo và sự cúng tế siêu nhiên", D: "Bằng việc áp đặt các giá trị đạo đức cá nhân của nhà nghiên cứu" }, ans: "A", exp: "Xã hội học của Comte tuân thủ phương pháp luận thực chứng, tức là xem xét và lý giải các hiện tượng xã hội bằng các dữ liệu khách quan đồng thời giảm thiểu các dữ liệu chủ quan." },
        { q: "21. Theo Comte, phương pháp luận thực chứng là sự tư duy về mối quan hệ không thể tách rời giữa hai yếu tố nào?", opts: { A: "Lực lượng sản xuất và quan hệ sản xuất", B: "\"Hệ thống khái quát các quan niệm về con người\" và \"chính trị\"", C: "Niềm tin tôn giáo và khoa học tự nhiên", D: "Đạo đức cá nhân và pháp luật nhà nước" }, ans: "B", exp: "Phương pháp luận thực chứng là phương pháp luận tư duy về mối quan hệ không thể tách rời giữa một bên là “hệ thống khái quát các quan niệm về con người” và một bên là chính trị." },
        { q: "22. Trong tư duy phương pháp luận thực chứng của Comte, yếu tố nào đóng vai trò là \"cơ sở tư duy\" và yếu tố nào là \"mục đích\"?", opts: { A: "Chính trị là cơ sở tư duy, hệ thống khái quát các quan niệm về con người là mục đích", B: "Hệ thống khái quát các quan niệm về con người là cơ sở tư duy, chính trị là mục đích", C: "Kinh tế là cơ sở tư duy, tôn giáo là mục đích", D: "Luật pháp là cơ sở tư duy, đạo đức xã hội là mục đích" }, ans: "B", exp: "Hệ thống khái quát các quan niệm về con người là cơ sở tư duy trong khi đó chính trị là mục đích, tức là kiến tạo một hệ thống xã hội hài hòa và phổ biến." },
        { q: "23. Auguste Comte cho rằng xã hội học giống các ngành khoa học tự nhiên nào vì đều vận dụng các phương pháp luận nghiên cứu tự nhiên để tìm hiểu bản chất xã hội?", opts: { A: "Hóa học và địa chất học", B: "Vật lý và sinh vật học", C: "Toán học và tin học", D: "Thiên văn học và khí tượng học" }, ans: "B", exp: "Xã hội học giống các ngành khoa học tự nhiên như vật lý, sinh vật học vì đều vận dụng các phương pháp luận nghiên cứu tự nhiên để tìm hiểu bản chất xã hội." },
        { q: "24. Vì cho rằng sự tiến triển của xã hội loài người cũng tuân theo các quy luật giống như quy luật tự nhiên, Auguste Comte còn gọi xã hội học là gì?", opts: { A: "Cơ học xã hội", B: "Tĩnh học xã hội", C: "Vật lý học xã hội", D: "Động học xã hội" }, ans: "C", exp: "Ông cho rằng sự tiến triển của xã hội loài người cũng tuân theo các quy luật như quy luật tự nhiên. Vì thế, ông còn gọi xã hội học là vật lý học xã hội." },
        { q: "25. Nghiên cứu xã hội bằng phương pháp thực chứng theo Auguste Comte là quá trình kiến tạo yếu tố nào để hiểu thực tế xã hội?", opts: { A: "Kiến tạo các giáo lý tôn giáo mới", B: "Kiến tạo thuật ngữ khoa học và lý luận", C: "Kiến tạo các thiết chế pháp luật cưỡng bức", D: "Kiến tạo các mô hình triết học tự biện trừu tượng" }, ans: "B", exp: "Nghiên cứu xã hội bằng phương pháp thực chứng là quá trình kiến tạo thuật ngữ khoa học và lý luận để hiểu thực tế xã hội trên cơ sở thu thập và xử lý thông tin, xây dựng và kiểm định giả thuyết, so sánh và tổng hợp dữ liệu." },
        { q: "26. Các phương pháp thu thập dữ liệu thực tiễn do Auguste Comte gợi ý cho xã hội học bao gồm những phương pháp nào?", opts: { A: "Phỏng vấn sâu, thảo luận nhóm, điều tra bảng hỏi, phân tích nội dung", B: "Trắc nghiệm tâm lý, nghiên cứu trường hợp, khảo sát thực địa, nhân chủng học", C: "Quan sát, thực nghiệm, so sánh, phân tích lịch sử", D: "Thống kê toán học, mô hình hóa máy tính, dự báo xã hội, phân tích tài liệu sẵn có" }, ans: "C", exp: "Các phương pháp thu thập dữ liệu thực tiễn do Comte gợi ý bao gồm: quan sát; thực nghiệm; so sánh; phân tích lịch sử." },
        { q: "27. Theo Auguste Comte, để giải thích được các hiện tượng xã hội thông qua phương pháp quan sát, người quan sát phải làm gì?", opts: { A: "Áp đặt các suy luận triết lý tự biện chủ quan của mình", B: "Thoát ra khỏi tư tưởng giáo điều hay triết lý tự biện bằng cách đề ra các bước, các thủ tục và quy trình cụ thể", C: "Chỉ tập trung quan sát các hiện tượng siêu nhiên tác động đến đời sống", D: "Thực hiện ghi chép ngẫu nhiên không cần tuân theo quy trình cụ thể nào" }, ans: "B", exp: "Ông yêu cầu người quan sát phải thoát ra khỏi tư tưởng giáo điều hay triết lý tự biện bằng cách đề ra các bước, các thủ tục và quy trình cụ thể." },
        { q: "28. Theo định nghĩa trong tài liệu, thực nghiệm xã hội theo gợi ý của Auguste Comte được hiểu là gì?", opts: { A: "Việc xây dựng các phòng thí nghiệm khoa học tự nhiên để nghiên cứu con người", B: "Việc tạo ra những điều kiện nhân tạo để xem xét ảnh hưởng của chúng tới một hiện tượng, một sự kiện xã hội nhất định", C: "Việc áp dụng các chính sách kinh tế mới để thử nghiệm phản ứng của thị trường", D: "Việc thay đổi thể chế chính trị của một quốc gia một cách ngẫu nhiên" }, ans: "B", exp: "Thực nghiệm xã hội là tạo ra những điều kiện nhân tạo để xem xét ảnh hưởng của chúng tới một hiện tượng, một sự kiện xã hội nhất định." },
